<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fenhollow Map Editor</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #1a1a1a; color: #ccc; font: 12px/1.4 monospace; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
#toolbar { background: #222; border-bottom: 1px solid #444; padding: 6px 10px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; flex-wrap: wrap; }
#toolbar h1 { font-size: 13px; color: #88ccaa; letter-spacing: 1px; }
#toolbar select, #toolbar button { background: #333; color: #ccc; border: 1px solid #555; padding: 3px 8px; font: inherit; cursor: pointer; }
#toolbar button:hover { background: #444; }

#main { display: flex; flex: 1; overflow: hidden; }

/* Column 1: Graph */
#graph-panel { width: 320px; flex-shrink: 0; background: #1e1e1e; border-right: 1px solid #333; display: flex; flex-direction: column; }
#graph-panel h2 { font-size: 11px; color: #888; padding: 6px 8px; border-bottom: 1px solid #333; text-transform: uppercase; letter-spacing: 1px; }
#graph-canvas { flex: 1; cursor: grab; }

/* Column 2: Editor */
#editor-panel { flex: 1; display: flex; flex-direction: column; background: #1a1a1a; overflow: hidden; border-right: 1px solid #333; }
#palette-bar { background: #222; border-bottom: 1px solid #333; padding: 6px 10px; display: flex; gap: 6px; align-items: center; flex-wrap: wrap; flex-shrink: 0; }
#palette-bar span { font-size: 10px; color: #666; margin-right: 4px; }
#tile-canvas-wrap { flex: 1; overflow: auto; display: flex; align-items: flex-start; padding: 16px; background: #111; }
#tile-canvas { image-rendering: pixelated; cursor: crosshair; box-shadow: 0 0 20px rgba(0,0,0,0.5); }

/* Column 3: Properties */
#props-panel { width: 380px; flex-shrink: 0; display: flex; flex-direction: column; background: #222; overflow: hidden; }
#exits-panel { padding: 12px; border-bottom: 1px solid #444; flex-shrink: 0; overflow-y: auto; max-height: 60vh; }
#exits-panel h2 { font-size: 11px; color: #888; padding-bottom: 8px; border-bottom: 1px solid #333; margin-bottom: 10px; text-transform: uppercase; }
#exits-list { margin-bottom: 12px; max-height: 120px; overflow-y: auto; background: #1a1a1a; padding: 4px; border: 1px solid #333; }
.exit-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 6px; margin-bottom: 2px; background: #2a2a2a; border-radius: 2px; }
.exit-row:hover { background: #333; }

#validation-panel { padding: 8px 12px; border-bottom: 1px solid #333; flex-shrink: 0; }
#validation-panel h3 { font-size: 10px; color: #666; text-transform: uppercase; margin-bottom: 4px; letter-spacing: 1px; }
#validation-list { max-height: 80px; overflow-y: auto; }

#dsl-panel { flex: 1; display: flex; flex-direction: column; padding: 12px; background: #111; min-height: 0; }
#dsl-panel h2 { font-size: 11px; color: #888; padding-bottom: 6px; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
#dsl-out { flex: 1; width: 100%; background: #0a0a0a; color: #6a8; border: 1px solid #333; padding: 8px; font: 11px/1.5 monospace; resize: none; outline: none; min-height: 0; }

.tile-btn { width: 24px; height: 24px; border: 2px solid #555; cursor: pointer; position: relative; }
.tile-btn.active { border-color: #88ccaa; }

#scenery-modal { display: none; position: fixed; background: #222; border: 1px solid #555; padding: 10px; z-index: 100; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
#scenery-grid { display: grid; grid-template-columns: repeat(6, 40px); gap: 4px; }
.scenery-btn { width: 40px; height: 40px; background: #333; border: 1px solid #555; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 9px; color: #888; }
.scenery-btn canvas { image-rendering: pixelated; }

#status { position: fixed; bottom: 10px; left: 330px; background: rgba(0,0,0,0.7); padding: 4px 10px; font-size: 10px; color: #aaa; border-radius: 4px; pointer-events: none; max-width: 600px; }
</style>
</head>
<body>

<div id="toolbar">
  <h1>⬡ FENHOLLOW MAP EDITOR</h1>
  <select id="room-select"></select>
  <button id="btn-add-row">+Row</button>
  <button id="btn-add-col">+Col</button>
  <button id="btn-del-row">-Row</button>
  <button id="btn-del-col">-Col</button>

  <div style="display:flex; align-items:center; gap:4px; margin-left:8px; background:#333; padding:2px 6px; border:1px solid #555">
    <span style="font-size:10px; color:#888">SIZE:</span>
    <input type="number" id="inp-width" style="width:35px; background:none; border:none; color:#fff; font:inherit">
    <span style="color:#666">×</span>
    <input type="number" id="inp-height" style="width:35px; background:none; border:none; color:#fff; font:inherit">
  </div>

  <div style="display:flex; align-items:center; gap:4px; margin-left:8px; background:#333; padding:2px 6px; border:1px solid #555" title="Blue-noise place a prop across the room's walkable area with a minimum gap. Click again to re-roll.">
    <span style="font-size:10px; color:#888">SCATTER:</span>
    <select id="scatter-label" style="background:#333; color:#fff; border:1px solid #555; font:inherit; font-size:10px"></select>
    <span style="font-size:10px; color:#888">gap</span>
    <input type="number" id="scatter-gap" value="3" min="1" style="width:30px; background:none; border:none; color:#fff; font:inherit">
    <button id="btn-scatter" style="background:#335577; color:#aaccff; border:1px solid #446688">Scatter</button>
    <button id="btn-scatter-clear" style="background:#553333; color:#ccc; border:1px solid #664444">Clear</button>
  </div>

  <button id="btn-exit-place" style="background:#444; color:#ccc; border:1px solid #555" title="Toggle exit-place mode: click a tile to set exit X/Y coordinates. Shift+click any exit tile to navigate to that room.">Exit Place</button>
  <button id="btn-revert" style="background:#444; color:#fff; border:1px solid #555">Revert Room</button>
  <button id="btn-export" style="background:#2a4a8a; color:#fff; border:1px solid #3a5aaa">Export All (Download)</button>
  <button id="btn-copy" style="margin-left:auto; background:#33aa55; color:#fff; border-color:#33aa55">Copy DSL</button>
</div>

<div id="main">
  <!-- Col 1 -->
  <div id="graph-panel">
    <h2 style="display:flex;align-items:center;justify-content:space-between">World Graph <button id="btn-reset-layout" style="font-size:9px;padding:2px 6px;background:#333;border:1px solid #555;color:#aaa;cursor:pointer" title="Re-run force-directed layout from scratch">Reset Layout</button></h2>
    <canvas id="graph-canvas"></canvas>
  </div>

  <!-- Col 2 -->
  <div id="editor-panel">
    <div id="palette-bar">
      <span>TILE:</span>
    </div>
    <div id="tile-canvas-wrap">
      <canvas id="tile-canvas"></canvas>
    </div>
  </div>

  <!-- Col 3 -->
  <div id="props-panel">
    <div id="validation-panel">
      <h3>Validation</h3>
      <div id="validation-list"></div>
    </div>

    <div id="exits-panel">
      <h2>Exits (Outbound)</h2>
      <div id="exits-list"></div>

      <div id="inbound-panel" style="margin-top:10px; padding-top:10px; border-top:1px dashed #444">
        <h2 style="font-size:10px; color:#666; margin-bottom:6px">Inbound (Others pointing here)</h2>
        <div id="inbound-list" style="font-size:10px; color:#888; max-height:60px; overflow-y:auto"></div>
      </div>

      <div style="margin-top:12px; padding-top:10px; border-top:1px solid #333">
        <h2 style="font-size:11px; color:#888; margin-bottom:8px">Add / Edit Exit</h2>
        <div style="display:grid; grid-template-columns:1fr 1fr auto; gap:4px">
        <select id="new-exit-dir" style="background:#333; color:#ccc; border:1px solid #555; font:inherit">
          <option value="north">North</option>
          <option value="north_east">North-East</option>
          <option value="east">East</option>
          <option value="south_east">South-East</option>
          <option value="south">South</option>
          <option value="south_west">South-West</option>
          <option value="west">West</option>
          <option value="north_west">North-West</option>
          <option value="up">Up</option>
          <option value="down">Down</option>
        </select>
        <select id="new-exit-dest" style="background:#333; color:#ccc; border:1px solid #555; font:inherit"></select>
        <button id="btn-smart-fill" style="background:#335577; color:#aaccff; border:1px solid #446688; padding:2px 8px; cursor:pointer" title="Auto-fill exit tile position and landing coords based on direction">Smart Fill</button>
        <button id="btn-add-exit" style="background:#33aa55; color:#fff; border:none; padding:2px 10px; cursor:pointer; font-weight:bold">+</button>
      </div>

      <div style="display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:4px; margin-top:6px">
        <input type="number" id="new-exit-x" placeholder="X" title="Tile X on this map (click Exit Place then a tile to auto-fill)" style="background:#333; color:#fff; border:1px solid #555; padding:4px; font-size:10px">
        <input type="number" id="new-exit-y" placeholder="Y" title="Tile Y on this map" style="background:#333; color:#fff; border:1px solid #555; padding:4px; font-size:10px">
        <input type="number" id="new-exit-dx" placeholder="DX" title="Where you land in destination room X" style="background:#333; color:#fff; border:1px solid #555; padding:4px; font-size:10px">
        <input type="number" id="new-exit-dy" placeholder="DY" title="Where you land in destination room Y" style="background:#333; color:#fff; border:1px solid #555; padding:4px; font-size:10px">
      </div>

      <div style="display:flex; justify-content:space-between; align-items:center; margin-top:8px">
        <select id="new-exit-type" style="background:#333; color:#ccc; border:1px solid #555; font:inherit; font-size:10px">
          <option value="edge">Type: Edge</option>
          <option value="door">Type: Door</option>
          <option value="stairs">Type: Stairs</option>
          <option value="pit">Type: Pit</option>
        </select>
        <label style="font-size:10px; color:#aaa; cursor:pointer"><input type="checkbox" id="chk-reciprocal" checked> Auto-Return</label>
      </div>
    </div>

    <div id="dsl-panel">
      <h2>DSL Output <button id="btn-copy2" style="background:#444; border:1px solid #555; color:#aaa; padding:1px 6px; font-size:9px">Copy</button></h2>
      <textarea id="dsl-out" readonly></textarea>
    </div>
  </div>
</div>

<div id="scenery-modal">
  <h3>Place Scenery (right-click tile)</h3>
  <div id="scenery-grid"></div>
  <div style="margin-top:8px;display:flex;gap:8px">
    <button id="btn-scenery-clear" style="background:#aa3333;color:#fff;border:none;padding:3px 8px;cursor:pointer;font:inherit">Clear</button>
    <button id="btn-scenery-cancel" style="background:#333;color:#ccc;border:1px solid #555;padding:3px 8px;cursor:pointer;font:inherit">Cancel</button>
  </div>
</div>

<div id="status"></div>

<script type="module" src="./editor.js"></script>
</body>
</html>
