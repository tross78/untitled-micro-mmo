<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Hearthwick</title>
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="wss://tracker.openwebtorrent.com" crossorigin>
    <link rel="preconnect" href="wss://tracker.files.fm:7073/announce" crossorigin>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000;
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            padding: 12px 12px 0 12px;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
            text-shadow: 0 0 4px rgba(0, 255, 0, 0.4);
            overflow: hidden;
        }

        @keyframes logFadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .log-line {
            animation: logFadeIn 0.1s ease-out forwards;
            margin-bottom: 2px;
        }

        @keyframes shake {
            0% { transform: translate(0,0); }
            20% { transform: translate(-4px, 4px); }
            40% { transform: translate(-4px, -4px); }
            60% { transform: translate(4px, 4px); }
            80% { transform: translate(4px, -4px); }
            100% { transform: translate(0,0); }
        }

        .shake {
            animation: shake 0.2s cubic-bezier(.36,.07,.19,.97) both;
        }

        #output {
            flex: 1 1 0;
            overflow-y: auto;
            white-space: pre-wrap;
            margin-bottom: 8px;
            min-height: 0;
            scrollbar-width: thin;
            scrollbar-color: #0f0 #000;
            overscroll-behavior: contain;
        }

        /* Action Buttons */
        #action-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 8px 0;
            border-top: 1px solid #222;
        }

        .action-btn {
            background: #111;
            border: 1px solid #0f0;
            color: #0f0;
            font-family: inherit;
            font-size: 0.85em;
            padding: 8px 14px;
            cursor: pointer;
            border-radius: 4px;
            user-select: none;
            touch-action: manipulation;
            transition: all 0.1s ease;
            box-shadow: 0 0 5px rgba(0, 255, 0, 0.2);
        }

        .action-btn:active {
            background: #0f0;
            color: #000;
            transform: translateY(2px);
        }

        /* Suggestion chips */
        #suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding: 4px 0;
            min-height: 0;
        }

        .chip {
            background: #000;
            border: 1px solid #0a0;
            color: #0f0;
            font-family: inherit;
            font-size: 0.82em;
            padding: 4px 10px;
            cursor: pointer;
            border-radius: 2px;
            user-select: none;
            touch-action: manipulation;
            transition: all 0.1s ease;
        }

        .chip:hover,
        .chip.active {
            background: #0f0;
            color: #000;
            transform: scale(1.05);
        }

        .chip.immediate {
            border-color: #0f0;
        }

        /* Input row */
        #input-container {
            display: flex;
            align-items: center;
            padding: 4px 0;
            border-top: 1px solid #222;
            /* Respect iPhone home indicator / notch at the bottom */
            padding-bottom: max(4px, env(safe-area-inset-bottom));
        }

        #prompt {
            color: #0a0;
            margin-right: 8px;
            flex-shrink: 0;
        }

        #input {
            background: transparent;
            border: none;
            color: #0f0;
            font-family: inherit;
            font-size: inherit;
            flex: 1;
            outline: none;
            min-width: 0;
        }
    </style>
</head>
<body>
    <div id="output">Initializing P2P network...
Searching for peers in the BitTorrent DHT...</div>

    <div id="banner-ad" style="display:none;"></div>

    <div id="action-buttons"></div>

    <div id="suggestions"></div>

    <div id="input-container" style="display: none;">
        <span id="prompt">></span>
        <input type="text" id="input" autofocus spellcheck="false" autocomplete="off"
               autocorrect="off" autocapitalize="off" enterkeyhint="send"
               placeholder="type a command or tap below">
    </div>

    <script src="main.js"></script>
</body>
</html>
