<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Hearthwick</title>
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="wss://tracker.openwebtorrent.com" crossorigin>
    <link rel="preconnect" href="wss://tracker.files.fm:7073/announce" crossorigin>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="game-area">
        <div id="radar-container"></div>
    </div>

    <div id="side-panel"></div>

    <div id="action-buttons"></div>

    <div id="debug-console" class="debug-console is-hidden">
        <div id="output">Initializing P2P network...
Searching for peers in the BitTorrent DHT...</div>
        <div id="banner-ad" class="banner-ad is-hidden"></div>
        <div id="suggestions"></div>
        <div id="input-container" class="input-container">
            <span id="prompt">&gt;</span>
            <input type="text" id="input" autofocus spellcheck="false" autocomplete="off"
                   autocorrect="off" autocapitalize="off" enterkeyhint="send"
                   placeholder="type a command...">
        </div>
    </div>

    <div id="ui-modal-root"></div>

    <script src="main.js"></script>
</body>
</html>
