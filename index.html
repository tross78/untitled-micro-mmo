<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hearthwick</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body {
            background-color: #000;
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }
        #output {
            flex-grow: 1;
            overflow-y: auto;
            white-space: pre-wrap;
            margin-bottom: 10px;
            scrollbar-width: thin;
            scrollbar-color: #0f0 #000;
        }
        #input-container {
            display: flex;
        }
        #prompt {
            margin-right: 10px;
        }
        #input {
            background: transparent;
            border: none;
            color: #0f0;
            font-family: inherit;
            font-size: inherit;
            flex-grow: 1;
            outline: none;
        }
    </style>
</head>
<body>
    <div id="output">Initializing P2P network...
Searching for peers in the BitTorrent DHT...</div>
    <div id="input-container">
        <span id="prompt">></span>
        <input type="text" id="input" autofocus spellcheck="false" autocomplete="off">
    </div>
    <script src="main.js"></script>
</body>
</html>
