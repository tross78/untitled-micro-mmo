name: Deploy to Pi (Arbiter)

on:
  push:
    branches:
      - main
    paths:
      - 'arbiter/**'
      - 'src/rules.js' # Rules shared with the arbiter
      - 'package.json'

jobs:
  deploy-to-pi:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Connect to Tailscale 🪜
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Deploy to Pi via SSH 🚀
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PI_TAILSCALE_IP }}
          username: pizero
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Create directory if it doesn't exist
            mkdir -p ~/untitled-micro-mmo
            cd ~/untitled-micro-mmo

            # Handle git initialization/cloning
            if [ ! -d ".git" ]; then
              echo "Cleaning existing non-git directory and cloning fresh..."
              rm -rf * .[^.]*
              git clone https://github.com/tross78/untitled-micro-mmo.git .
            else
              echo "Pulling latest changes..."
              git fetch --all
              git reset --hard origin/main
            fi

            # Force the PATH to include common Node installation spots on Pi
            export PATH=$PATH:/usr/local/bin:/usr/bin:/bin:/home/pizero/.nvm/versions/node/*/bin:/home/pizero/node/bin
            
            # Diagnostic: If npm is still missing, try to find it
            if ! command -v npm &> /dev/null; then
              echo "Searching for npm..."
              NPM_PATH=$(find /home/pizero -name npm -type f -executable -print -quit 2>/dev/null)
              if [ -n "$NPM_PATH" ]; then
                export PATH=$PATH:$(dirname "$NPM_PATH")
                echo "Found npm at: $NPM_PATH"
              fi
            fi

            # Install arbiter dependencies
            if command -v npm &> /dev/null; then
              cd arbiter
              npm install --production --no-package-lock
            else
              echo "ERROR: npm still not found. Please run 'which npm' on your Pi and tell me the path."
              exit 1
            fi

            # Restart the arbiter (if using PM2)
            # pm2 restart arbiter || pm2 start arbiter/index.js --name arbiter

